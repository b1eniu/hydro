<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hydroAPP Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; }
        .card-custom { background: white; border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        /* Fix dla wykresu - sztywna wysokość */
        .chart-wrapper { position: relative; height: 180px; width: 100%; }
        .station-row { transition: background 0.2s; border-left: 4px solid transparent; }
        .selected-station { background-color: #f0f7ff !important; border-left-color: #3b82f6 !important; }
        #settings-modal { display: none; }
        .modal-active { display: flex !important; }
        /* Pływający przycisk odwracania */
        .reverse-fab { position: fixed; bottom: 20px; right: 20px; z-index: 50; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto sticky top-0 bg-white/90 backdrop-blur-lg z-40">
        <div class="flex flex-col">
            <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest">Status</span>
            <span id="last-update" class="text-[10px] font-bold text-blue-500">Aktualizacja: --:--</span>
        </div>
        <h1 class="font-black text-xl tracking-tighter italic text-gray-800">hydro<span class="text-blue-600">APP</span></h1>
        <button onclick="toggleSettings()" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center shadow-sm">
            <i class="bi bi-sliders2 text-gray-700"></i>
        </button>
    </header>

    <main class="px-4 max-w-2xl mx-auto space-y-6">
        <div id="current-info" class="text-center">
            <p id="river-display" class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em] mb-1">WISŁA</p>
            <h2 id="station-display" class="text-2xl font-black text-gray-800 tracking-tight">Wybierz stację</h2>
        </div>

        <div class="grid grid-cols-4 gap-2">
            <div class="card-custom p-3 text-center border border-gray-50">
                <i class="bi bi-thermometer-half text-blue-500 text-sm"></i>
                <p id="temp" class="text-xs font-black mt-1">--°C</p>
            </div>
            <div class="card-custom p-3 text-center border border-gray-50">
                <i class="bi bi-droplets-fill text-blue-500 text-sm"></i>
                <p id="rain" class="text-xs font-black mt-1">--mm</p>
            </div>
            <div class="card-custom p-3 text-center border border-gray-50">
                <i id="wind-icon" class="bi bi-wind text-blue-500 text-sm"></i>
                <p id="wind" class="text-xs font-black mt-1">--m/s</p>
            </div>
            <div class="card-custom p-3 text-center border border-gray-50">
                <i class="bi bi-speedometer text-blue-500 text-sm"></i>
                <p id="press" class="text-xs font-black mt-1">--hPa</p>
            </div>
        </div>

        <div class="card-custom p-5">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Trend 24h</span>
                <span class="text-[9px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded">POZIOM WODY</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="hydroChart"></canvas>
            </div>
        </div>

        <div class="card-custom overflow-hidden border border-gray-100">
            <div class="bg-gray-50/50 px-6 py-3 border-b border-gray-100 flex justify-between items-center">
                <span id="dir-label" class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Kierunek: Źródło ➔ Ujście</span>
                <i class="bi bi-distribute-vertical text-blue-400"></i>
            </div>
            <div id="list-container" class="divide-y divide-gray-50">
                </div>
        </div>
    </main>

    <button onclick="handleReverse()" class="reverse-fab bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-xl active:scale-90 transition-transform">
        <i class="bi bi-arrow-down-up"></i>
    </button>

    <div id="settings-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 animate-up shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl">Wybór Rzeki</h3>
                <button onclick="toggleSettings()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">&times;</button>
            </div>
            <div id="river-grid" class="grid grid-cols-2 gap-3 max-h-[40vh] overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <script>
        const rivers = ["Wisła", "Odra", "Warta", "Bug", "Narew", "San", "Noteć", "Pilica", "Wieprz", "Bóbr", "Łyna", "Nysa Łużycka", "Wkra", "Dunajec", "Brda", "Prosna", "Drwęca", "Wisłok", "Wda", "Drawa", "Nysa Kłodzka", "Poprad", "Pasłęka", "Rega", "Bzura"];
        
        let hydroData = [];
        let activeRiver = "Wisła";
        let activeStation = "Warszawa-Bulwary";
        let isDescending = false;
        let chartObj = null;

        async function start() {
            renderRiverGrid();
            await fetchData();
            setInterval(fetchData, 600000); // Co 10 min
        }

        function renderRiverGrid() {
            const grid = document.getElementById('river-grid');
            rivers.sort().forEach(r => {
                const b = document.createElement('button');
                b.className = "p-3 rounded-xl bg-gray-50 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-all";
                b.innerText = r;
                b.onclick = () => { activeRiver = r; toggleSettings(); fetchData(); };
                grid.appendChild(b);
            });
        }

        async function fetchData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                
                // Filtrowanie i sortowanie hydrograficzne (uproszczone po ID dla rzek głównych)
                hydroData = data.filter(s => s.rzeka.toLowerCase() === activeRiver.toLowerCase());
                hydroData.sort((a, b) => parseInt(a.id_stacji) - parseInt(b.id_stacji));
                
                if (isDescending) hydroData.reverse();
                
                document.getElementById('last-update').innerText = `Aktualizacja: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                updateUI();
            } catch (e) { console.error("Błąd API IMGW"); }
        }

        function handleReverse() {
            isDescending = !isDescending;
            hydroData.reverse();
            document.getElementById('dir-label').innerText = isDescending ? "Kierunek: Ujście ➔ Źródło" : "Kierunek: Źródło ➔ Ujście";
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            document.getElementById('river-display').innerText = activeRiver;

            if (hydroData.length === 0) {
                container.innerHTML = '<p class="p-10 text-center text-gray-400 text-sm">Brak aktywnych stacji</p>';
                return;
            }

            if (!hydroData.find(s => s.stacja === activeStation)) activeStation = hydroData[0].stacja;
            document.getElementById('station-display').innerText = activeStation;

            hydroData.forEach(s => {
                const isSel = s.stacja === activeStation;
                const row = document.createElement('div');
                row.className = `station-row px-6 py-4 flex justify-between items-center cursor-pointer ${isSel ? 'selected-station' : ''}`;
                row.onclick = () => { activeStation = s.stacja; updateUI(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                
                row.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${s.stacja}</p>
                        <p class="text-[8px] text-gray-400 font-black uppercase tracking-widest mt-0.5">${s.id_stacji}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-lg font-black font-mono text-blue-600">${s.stan_wody || '--'}</span>
                        <span class="text-[10px] text-gray-400 ml-0.5 uppercase font-bold italic">cm</span>
                    </div>
                `;
                container.appendChild(row);
                if (isSel) {
                    // Dla demo używamy sztywnej lokalizacji, w realu można dodać mapę współrzędnych
                    fetchWeather(52.2, 21.0); 
                    renderChart(parseInt(s.stan_wody));
                }
            });
        }

        async function fetchWeather(lat, lon) {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=precipitation_sum&timezone=auto`);
            const d = await res.json();
            document.getElementById('temp').innerText = Math.round(d.current_weather.temperature) + "°C";
            document.getElementById('rain').innerText = d.daily.precipitation_sum[0] + "mm";
            document.getElementById('wind').innerText = (d.current_weather.windspeed / 3.6).toFixed(1) + "m/s";
            document.getElementById('wind-icon').style.transform = `rotate(${d.current_weather.winddirection}deg)`;
        }

        function renderChart(val) {
            const ctx = document.getElementById('hydroChart').getContext('2d');
            const dataTrend = [val-2, val-5, val-1, val+3, val+1, val-1, val];
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['', '', '', '', '', '', ''],
                    datasets: [{
                        data: dataTrend,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false },
                        y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        function toggleSettings() { 
            const m = document.getElementById('settings-modal');
            m.classList.toggle('modal-active');
        }

        start();
    </script>
</body>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-50 items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[30px] p-8 shadow-2xl animate-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-2xl tracking-tight text-gray-800">Wybierz rzekę</h3>
                <button onclick="toggleSettings()" class="bg-gray-100 rounded-full w-10 h-10 flex items-center justify-center text-gray-500 hover:text-black">&times;</button>
            </div>
            <div class="max-h-[50vh] overflow-y-auto pr-2" id="river-options"></div>
        </div>
    </div>

    <script>
        const riverList = ["Wisła", "Odra", "Warta", "Bug", "Narew", "San", "Noteć", "Pilica", "Wieprz", "Bóbr", "Łyna", "Nysa Łużycka", "Wkra", "Dunajec", "Brda", "Prosna", "Drwęca", "Wisłok", "Wda", "Drawa", "Nysa Kłodzka", "Poprad", "Pasłęka", "Rega", "Bzura"];

        const stationCoords = {
            "Sandomierz": [50.68, 21.75], "Annopol": [50.88, 21.85], "Zawichost": [50.80, 21.85],
            "Puławy": [51.42, 21.95], "Dęblin": [51.55, 21.83], "Warszawa-Bulwary": [52.24, 21.03],
            "Włocławek": [52.66, 19.07], "Toruń": [53.01, 18.60], "Tczew": [54.09, 18.79]
        };

        let rawHydroData = [];
        let currentRiver = "Wisła";
        let selectedStation = "Puławy";
        let myChart = null;
        let isReversed = false;

        async function init() {
            setupSettings();
            await loadData();
            setInterval(() => { if (new Date().getMinutes() === 0) loadData(); }, 60000);
            document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") loadData(); });
        }

        function setupSettings() {
            const container = document.getElementById('river-options');
            riverList.sort().forEach(river => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 mb-2 rounded-2xl bg-gray-50 hover:bg-blue-50 font-bold text-gray-700 transition-all flex justify-between items-center";
                btn.innerHTML = `${river} <i class="bi bi-chevron-right text-gray-300"></i>`;
                btn.onclick = () => { currentRiver = river; isReversed = false; toggleSettings(); loadData(); };
                container.appendChild(btn);
            });
        }

        async function loadData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                const seen = new Set();
                rawHydroData = data.filter(s => {
                    if (s.rzeka.toLowerCase() === currentRiver.toLowerCase() && !seen.has(s.stacja)) {
                        seen.add(s.stacja); return true;
                    }
                    return false;
                });

                // Sortowanie hydrograficzne (Południe -> Północ)
                rawHydroData.sort((a, b) => {
                    const latA = stationCoords[a.stacja]?.[0] || 50.0;
                    const latB = stationCoords[b.stacja]?.[0] || 50.0;
                    return latA - latB;
                });

                if (isReversed) rawHydroData.reverse();

                const now = new Date();
                document.getElementById('last-update-label').innerText = `Aktualizacja: ${now.getHours().toString().padStart(2, '0')}:00`;
                renderUI();
            } catch (e) { console.error(e); }
        }

        function reverseList() {
            isReversed = !isReversed;
            rawHydroData.reverse();
            document.getElementById('flow-direction-label').innerHTML = isReversed ? 
                '<i class="bi bi-water text-blue-400"></i> Bieg: Ujście → Źródło' : 
                '<i class="bi bi-water text-blue-400"></i> Bieg: Źródło → Ujście';
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('stations-list');
            list.innerHTML = '';
            
            if (rawHydroData.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-gray-400">Brak danych dla tej rzeki</div>';
                return;
            }

            if (!rawHydroData.find(s => s.stacja === selectedStation)) selectedStation = rawHydroData[0].stacja;
            document.getElementById('current-station-name').innerText = selectedStation;

            rawHydroData.forEach(s => {
                const level = parseInt(s.stan_wody) || 0;
                const isSelected = s.stacja === selectedStation;
                const coords = stationCoords[s.stacja] || [52.2, 21.0];

                const row = document.createElement('div');
                row.className = `px-6 py-5 flex justify-between items-center station-row ${isSelected ? 'selected-station' : ''}`;
                row.onclick = () => { selectedStation = s.stacja; renderUI(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                
                row.innerHTML = `
                    <div>
                        <p class="font-bold ${isSelected ? 'text-blue-600' : 'text-gray-700'} text-base leading-none">${s.stacja}</p>
                        <p class="text-[9px] text-gray-400 font-bold mt-1 uppercase italic">${currentRiver}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold font-mono-custom text-blue-500">${s.stan_wody || '--'}<span class="text-[10px] ml-1 text-gray-300 font-sans">cm</span></p>
                    </div>
                `;
                list.appendChild(row);
                if(isSelected) { updateWeather(coords[0], coords[1]); updateChart(level); }
            });
        }

        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=surface_pressure&daily=precipitation_sum&timezone=auto`);
                const data = await res.json();
                const cur = data.current_weather;
                document.getElementById('temp').innerText = Math.round(cur.temperature) + "°C";
                document.getElementById('rain').innerText = data.daily.precipitation_sum[0] + "mm";
                document.getElementById('wind').innerText = (cur.windspeed / 3.6).toFixed(1) + " m/s";
                document.getElementById('wind-icon').style.transform = `rotate(${cur.winddirection}deg)`;
                document.getElementById('pressure').innerText = Math.round(data.hourly.surface_pressure[new Date().getHours()]) + " hPa";
            } catch (e) { console.error(e); }
        }

        function updateChart(currentLevel) {
            const ctx = document.getElementById('hydroChart').getContext('2d');
            const trend = [currentLevel-3, currentLevel-1, currentLevel-2, currentLevel+2, currentLevel+4, currentLevel+2, currentLevel];
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['-6h', '-5h', '-4h', '-3h', '-2h', '-1h', 'Teraz'],
                    datasets: [{
                        data: trend,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { display: true, grid: { color: '#f8f9fa' }, ticks: { font: { size: 9 } } }, 
                        x: { display: true, grid: { display: false }, ticks: { font: { size: 9 } } } 
                    }
                }
            });
        }

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('modal-active'); }
        init();
    </script>
</body>

        // Baza współrzędnych dla kluczowych stacji (do sortowania)
        // Jeśli stacji nie ma tutaj, system użyje danych z IMGW (jeśli dostępne) lub pominie
        const stationCoords = {
            "Sandomierz": [50.68, 21.75], "Annopol": [50.88, 21.85], "Zawichost": [50.80, 21.85],
            "Puławy": [51.42, 21.95], "Dęblin": [51.55, 21.83], "Warszawa-Bulwary": [52.24, 21.03],
            "Włocławek": [52.66, 19.07], "Toruń": [53.01, 18.60], "Tczew": [54.09, 18.79]
        };

        let rawHydroData = [];
        let currentRiver = "Wisła";
        let selectedStation = "Puławy";
        let myChart = null;

            // Auto-refresh co pełną godzinę
            setInterval(() => { if (new Date().getMinutes() === 0) loadData(); }, 60000);

        }

        function setupSettings() {
            const container = document.getElementById('river-options');
            riverList.sort().forEach(river => {
                const btn = document.createElement('button');

                btn.onclick = () => { currentRiver = river; toggleSettings(); loadData(); };
                container.appendChild(btn);
            });
        }

        async function loadData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                
                // Usuwamy duplikaty i filtrujemy rzekę
                const seen = new Set();
                rawHydroData = data.filter(s => {
                    const isRiver = s.rzeka.toLowerCase() === currentRiver.toLowerCase();
                    const isNew = !seen.has(s.stacja);
                    if (isRiver && isNew) { seen.add(s.stacja); return true; }
                    return false;
                });

                // INTELIGENTNE SORTOWANIE HYDROGRAFICZNE
                // Większość rzek w Polsce płynie z Południa na Północ, więc sortujemy malejąco po szerokości geograficznej (Latitude)
                // Ale dane IMGW nie zawsze mają współrzędne, więc używamy fallbacku
                rawHydroData.sort((a, b) => {
                    const latA = stationCoords[a.stacja]?.[0] || 50.0;
                    const latB = stationCoords[b.stacja]?.[0] || 50.0;
                    return latA - latB; // Od południa (źródło) do północy (ujście)
                });

                document.getElementById('last-update-label').innerText = `Aktualizacja: ${now.getHours().toString().padStart(2, '0')}:00`;

            } catch (e) { console.error(e); }

                return;

            document.getElementById('current-station-name').innerText = selectedStation;

            rawHydroData.forEach(s => {
                const level = parseInt(s.stan_wody) || 0;
                const isSelected = s.stacja === selectedStation;
                const coords = stationCoords[s.stacja] || [52.0, 19.0];

                const row = document.createElement('div');
                row.className = `px-6 py-5 flex justify-between items-center station-row ${isSelected ? 'selected-station' : ''}`;
                row.onclick = () => { selectedStation = s.stacja; renderUI(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                
                row.innerHTML = `
                    <div>
                        <p class="font-bold ${isSelected ? 'text-blue-600' : 'text-gray-700'} text-base leading-none">${s.stacja}</p>
                        <p class="text-[9px] text-gray-400 font-bold mt-1 uppercase tracking-tighter italic">Stacja ${s.id_stacji}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold font-mono-custom text-blue-500">${s.stan_wody || '--'}<span class="text-[10px] ml-1 text-gray-300 font-sans">cm</span></p>

            // Symulacja danych historycznych (w realu pobierane z API/DB)
            const mockHistory = [currentLevel-5, currentLevel-3, currentLevel-4, currentLevel-2, currentLevel-1, currentLevel+1, currentLevel];
            
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Stan wody (cm)',
                        data: mockHistory,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: true }, x: { grid: { display: false } } } }
            });
        }

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('modal-active'); }
        function changeRiver(name) { currentRiver = name; renderUI(); }
        init();
    </script>
</body>
</html>                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-3 ml-1">Wybór rzeki</label>
                    <select id="river-select" onchange="changeRiver(this.value)" class="w-full p-5 bg-gray-100 rounded-2xl border-none font-bold text-gray-800 outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                        <option value="Wisła">Wisła</option>
                        <option value="Odra">Odra</option>
                        <option value="Warta">Warta</option>
                        <option value="Dunajec">Dunajec</option>
                        <option value="Bug">Bug</option>
                        <option value="Narew">Narew</option>
                    </select>
                </div>
                
                <div class="bg-blue-50 p-5 rounded-2xl flex gap-3 items-start">
                    <i class="bi bi-info-circle-fill text-blue-500 mt-0.5"></i>
                    <p class="text-xs text-blue-700 leading-relaxed font-medium">
                        Strona automatycznie pobiera świeże dane z IMGW na początku każdej godziny.
                    </p>
                </div>
                
                <button onclick="toggleSettings()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                    Zapisz i zamknij
                </button>
            </div>
        </div>
    </div>

    <script>
        // Dane techniczne stacji (współrzędne i progi)
        const stationLookup = {
            "Sandomierz": { warning: 420, alarm: 610, lat: 50.68, lon: 21.75 },
            "Annopol": { warning: 500, alarm: 550, lat: 50.88, lon: 21.85 },
            "Zawichost": { warning: 520, alarm: 620, lat: 50.80, lon: 21.85 },
            "Puławy": { warning: 450, alarm: 550, lat: 51.42, lon: 21.95 },
            "Dęblin": { warning: 400, alarm: 500, lat: 51.55, lon: 21.83 },
            "Kolonia nadwiślańska": { warning: 450, alarm: 550, lat: 51.21, lon: 21.83 },
            "Włocławek": { warning: 600, alarm: 650, lat: 52.66, lon: 19.07 }
        };

        let rawHydroData = [];
        let currentRiver = "Wisła";
        let selectedStation = "Puławy";

        // 1. INICJALIZACJA
        async function init() {
            await loadData();
            
            // Auto-odświeżanie co pełną godzinę
            setInterval(() => {
                if (new Date().getMinutes() === 0) loadData();
            }, 60000);

            // Odświeżanie po powrocie do karty
            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "visible") loadData();
            });
        }

        // 2. POBIERANIE DANYCH
        async function loadData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                
                // Usuwanie duplikatów stacji
                const seen = new Set();
                rawHydroData = data.filter(s => {
                    const duplicate = seen.has(s.stacja + s.rzeka);
                    seen.add(s.stacja + s.rzeka);
                    return !duplicate;
                });

                const now = new Date();
                document.getElementById('last-update-label').innerText = `Aktualizacja: ${now.getHours()}:00`;
                
                renderUI();
            } catch (e) {
                console.error("Błąd IMGW:", e);
            }
        }

        // 3. RENDEROWANIE INTERFEJSU
        function renderUI() {
            const list = document.getElementById('stations-list');
            list.innerHTML = '';
            
            document.getElementById('river-label').innerText = currentRiver;
            
            const filtered = rawHydroData.filter(s => s.rzeka.toLowerCase() === currentRiver.toLowerCase());

            if (filtered.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-gray-400 text-sm">Brak danych dla tej rzeki</div>';
                return;
            }

            // Sprawdź czy wybrana stacja jest na tej rzece, jak nie - weź pierwszą
            if (!filtered.find(s => s.stacja === selectedStation)) {
                selectedStation = filtered[0].stacja;
            }

            document.getElementById('current-station-name').innerText = selectedStation;

            filtered.forEach(s => {
                const config = stationLookup[s.stacja] || { lat: 52.2, lon: 21.0 };
                const level = parseInt(s.stan_wody) || 0;
                const isSelected = s.stacja === selectedStation;
                
                let colorClass = "text-blue-500";
                if (config.alarm && level >= config.alarm) colorClass = "text-red-500";
                else if (config.warning && level >= config.warning) colorClass = "text-orange-500";

                const row = document.createElement('div');
                row.className = `px-6 py-5 flex justify-between items-center station-row ${isSelected ? 'selected-station' : ''}`;
                row.onclick = () => {
                    selectedStation = s.stacja;
                    renderUI();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                
                row.innerHTML = `
                    <div>
                        <p class="font-bold ${isSelected ? 'text-blue-600' : 'text-gray-700'} text-base leading-none">${s.stacja}</p>
                        <div class="flex gap-3 mt-2">
                            ${config.warning ? `<span class="text-[9px] font-black text-orange-400/80 uppercase"><i class="bi bi-exclamation-triangle-fill"></i> ${config.warning}</span>` : ''}
                            ${config.alarm ? `<span class="text-[9px] font-black text-red-500/80 uppercase"><i class="bi bi-lightning-fill"></i> ${config.alarm}</span>` : ''}
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold font-mono-custom ${colorClass}">${s.stan_wody || '--'}<span class="text-[10px] ml-1 text-gray-400">cm</span></p>
                        ${isSelected ? '<p class="text-[7px] font-black text-blue-400 uppercase tracking-widest mt-1">Wybrana</p>' : ''}
                    </div>
                `;
                list.appendChild(row);
                
                if(isSelected) updateWeather(config.lat, config.lon);
            });
        }

        // 4. POGODA
        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=precipitation_sum,surface_pressure_max&timezone=auto`);
                const data = await res.json();
                const cur = data.current_weather;

                document.getElementById('temp').innerText = Math.round(cur.temperature) + "°C";
                document.getElementById('rain').innerText = data.daily.precipitation_sum[0] + "mm";
                document.getElementById('wind').innerText = (cur.windspeed / 3.6).toFixed(1) + " m/s";
                document.getElementById('wind-icon').style.transform = `rotate(${cur.winddirection}deg)`;
                document.getElementById('pressure').innerText = Math.round(data.daily.surface_pressure_max[0]) + " hPa";
            } catch (e) { console.error("Błąd pogodowy:", e); }
        }

        // 5. OBSŁUGA USTAWIEŃ
        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('modal-active');
        }

        function changeRiver(name) {
            currentRiver = name;
            renderUI();
        }

        init();
    </script>
</body>
</html>
