<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hydro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .card-custom { background: white; border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .chart-wrapper { position: relative; height: 160px; width: 100%; }
        .station-row { transition: background 0.2s; border-left: 4px solid transparent; border-bottom: 1px solid #f9fafb; }
        .selected-station { background-color: #f0f7ff !important; border-left-color: #3b82f6 !important; }
        
        .overlay { 
            display: none; position: fixed; inset: 0; background: white; 
            z-index: 10000; flex-direction: column; padding: 24px; overflow-y: auto;
        }
        .overlay.active { display: flex !important; }

        .status-warning { color: #f97316 !important; font-weight: 800; }
        .status-alarm { color: #ef4444 !important; font-weight: 800; }

        .reverse-btn-main { 
            background: #22c55e; color: white; padding: 12px 24px; 
            border-radius: 16px; font-weight: 900; font-size: 13px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            display: flex; align-items: center; gap: 8px;
        }
        
        /* Powiększona rzeka */
        #river-display { font-size: 16px; font-weight: 900; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto sticky top-0 bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex flex-col"><span id="last-update" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Aktualizacja: --:--</span></div>
        <h1 class="font-black text-2xl italic tracking-tighter text-gray-800">hydro</h1>
        <div class="flex gap-3">
            <button onclick="toggleScreen('info-screen', true)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i class="bi bi-info-circle"></i></button>
            <button onclick="toggleScreen('settings-screen', true)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i class="bi bi-gear-fill"></i></button>
        </div>
    </header>

    <div id="settings-screen" class="overlay">
        <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black italic">Wybierz rzekę</h3><button onclick="toggleScreen('settings-screen', false)" class="text-3xl">&times;</button></div>
        <div id="river-grid" class="grid grid-cols-2 gap-3 pb-10"></div>
    </div>

    <div id="info-screen" class="overlay">
        <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black italic">Informacje</h3><button onclick="toggleScreen('info-screen', false)" class="text-3xl">&times;</button></div>
        <div class="card-custom p-8 text-center space-y-4">
            <i class="bi bi-person-badge text-6xl text-blue-500"></i>
            <p class="text-lg font-bold">Autor: b1eniu</p>
            <p class="text-sm text-gray-500">tomaszbieniek86@gmail.com</p>
        </div>
    </div>

    <main class="px-4 max-w-2xl mx-auto space-y-6 mt-6">
        <div class="text-center">
            <p id="river-display" class="text-blue-500 uppercase tracking-[0.3em] mb-1">---</p>
            <h2 id="station-display" class="text-2xl font-black text-gray-800 tracking-tight">Wybierz stację</h2>
        </div>

        <div class="grid grid-cols-4 gap-2">
            <div class="card-custom p-3 text-center"><i class="bi bi-thermometer-half text-blue-500"></i><p id="temp" class="text-[11px] font-black mt-1">--°C</p></div>
            <div class="card-custom p-3 text-center"><i class="bi bi-droplets-fill text-blue-500"></i><p id="rain" class="text-[11px] font-black mt-1">--mm</p></div>
            <div class="card-custom p-3 text-center"><i id="wind-icon" class="bi bi-wind text-blue-500"></i><p id="wind" class="text-[11px] font-black mt-1">--m/s</p></div>
            <div class="card-custom p-3 text-center"><i class="bi bi-speedometer text-blue-500"></i><p id="press" class="text-[11px] font-black mt-1">--hPa</p></div>
        </div>

        <div class="card-custom p-5"><div class="chart-wrapper"><canvas id="hydroChart"></canvas></div></div>

        <div class="flex flex-col items-center gap-3">
            <button onclick="handleReverse()" class="reverse-btn-main"><i class="bi bi-arrow-down-up"></i> ODWRÓĆ LISTĘ</button>
            <p id="dir-text" class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Kierunek: Do ujścia</p>
        </div>

        <div class="card-custom overflow-hidden border border-gray-100">
            <div id="list-container" class="flex flex-col"></div>
        </div>
    </main>

    <script>
        const rivers = ["Wisła", "Odra", "Warta", "Bug", "Narew", "San", "Noteć", "Pilica", "Wieprz", "Bóbr", "Łyna", "Nysa Łużycka", "Wkra", "Dunajec", "Brda", "Prosna", "Drwęca", "Wisłok", "Wda", "Drawa", "Nysa Kłodzka", "Poprad", "Pasłęka", "Rega", "Bzura", "Radomka"];
        let hydroData = [], activeRiver = "Wisła", activeStation = "", isDescending = false, chartObj = null;

        function toggleScreen(id, state) { document.getElementById(id).classList.toggle('active', state); }

        async function fetchData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                hydroData = data.filter(s => s.rzeka.toLowerCase() === activeRiver.toLowerCase());
                hydroData.sort((a, b) => parseInt(a.id_stacji) - parseInt(b.id_stacji));
                if (isDescending) hydroData.reverse();
                if (!activeStation && hydroData.length > 0) activeStation = hydroData[0].stacja;
                document.getElementById('last-update').innerText = `Aktualizacja: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                updateUI();
            } catch (e) { console.error("API Error"); }
        }

        function updateUI() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            document.getElementById('river-display').innerText = activeRiver;
            document.getElementById('station-display').innerText = activeStation;
            document.getElementById('dir-text').innerText = isDescending ? "Kierunek: Do źródła" : "Kierunek: Do ujścia";

            const idx = hydroData.findIndex(s => s.stacja === activeStation);
            if (idx === -1) return;

            // Logika stacji: 4 nad, 1 wybrana, 2 pod
            const start = Math.max(0, idx - 4);
            const displaySlice = hydroData.slice(start, start + 7);

            displaySlice.forEach(s => {
                const isSel = s.stacja === activeStation;
                const curr = parseFloat(s.stan_wody) || 0;
                const ostrz = parseFloat(s.stan_ostrzegawczy), alarm = parseFloat(s.stan_alarmowy);

                let valClass = "text-blue-600";
                if (alarm && curr >= alarm) valClass = "status-alarm";
                else if (ostrz && curr >= ostrz) valClass = "status-warning";

                const row = document.createElement('div');
                row.className = `station-row px-6 py-5 flex justify-between items-center cursor-pointer ${isSel ? 'selected-station' : ''}`;
                row.onclick = () => { activeStation = s.stacja; updateUI(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                row.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${s.stacja}</p>
                        <div class="flex gap-3 text-[10px] font-bold uppercase italic mt-1">
                            <span class="text-orange-400">Ostrz: ${s.stan_ostrzegawczy || '---'}</span>
                            <span class="text-red-500">Alarm: ${s.stan_alarmowy || '---'}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black font-mono ${valClass}">${s.stan_wody || '--'}</span>
                        <span class="text-[10px] text-gray-300 font-bold ml-1 uppercase">cm</span>
                    </div>
                `;
                container.appendChild(row);
                if (isSel) { renderChart(curr); fetchWeather(); }
            });
        }

        function handleReverse() { isDescending = !isDescending; hydroData.reverse(); updateUI(); }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.2&longitude=21.0&current_weather=true&daily=precipitation_sum&timezone=auto');
                const d = await res.json();
                document.getElementById('temp').innerText = Math.round(d.current_weather.temperature) + "°C";
                document.getElementById('rain').innerText = d.daily.precipitation_sum[0] + "mm";
                document.getElementById('wind').innerText = (d.current_weather.windspeed / 3.6).toFixed(1) + "m/s";
                document.getElementById('press').innerText = "1014 hPa";
            } catch(e) {}
        }

        function renderChart(val) {
            const ctx = document.getElementById('hydroChart').getContext('2d');
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: { labels: ['','','','','','',''], datasets: [{ data: [val-2, val-3, val-1, val+2, val+1, val-1, val], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.4, borderWidth: 4, pointRadius: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
            });
        }

        const grid = document.getElementById('river-grid');
        rivers.sort().forEach(r => {
            const b = document.createElement('button');
            b.className = "p-5 rounded-2xl bg-gray-50 text-sm font-bold text-gray-700 text-left border border-gray-100 active:scale-95 transition-transform";
            b.innerText = r;
            b.onclick = () => { activeRiver = r; activeStation = ""; toggleScreen('settings-screen', false); fetchData(); };
            grid.appendChild(b);
        });

        fetchData();
    </script>
</body>
