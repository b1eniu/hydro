<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hydroAPP Pro Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-mono">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900 sticky top-0 z-50">
        <h1 class="text-blue-400 font-bold">hydroAPP <span class="text-xs text-gray-500">v2.0 WEB</span></h1>
        <div id="last-update" class="text-xs text-gray-400">Odświeżanie...</div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-800 p-4 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Temperatura</p>
                <p id="temp" class="text-xl font-bold">--°C</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Opad</p>
                <p id="rain" class="text-xl font-bold">--mm</p>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl mb-6">
            <p class="text-[10px] text-blue-400 font-bold mb-4 uppercase">Historia poziomu wody</p>
            <canvas id="waterChart"></canvas>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden">
            <div class="p-3 bg-gray-700 text-[10px] font-bold">STACJE NA RZECE WISŁA</div>
            <div id="stations-list" class="divide-y divide-gray-700">
                </div>
        </div>
    </main>

    <script>
        // LOGIKA POBIERANIA DANYCH (Twoja "Mózgownica")
        async function updateData() {
            try {
                const response = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await response.json();
                
                // Filtrowanie (Wisła, Puławy)
                const stations = data.filter(s => s.rzeka === "Wisła");
                renderStations(stations);
                
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Błąd pobierania:", error);
            }
        }

        function renderStations(stations) {
            const list = document.getElementById('stations-list');
            list.innerHTML = '';
            
            stations.forEach(s => {
                const row = `
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">${s.stacja}</p>
                            <p class="text-[10px] text-gray-400 uppercase">${s.id_stacji}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-blue-400">${s.stan_wody || '--'} cm</p>
                        </div>
                    </div>
                `;
                list.innerHTML += row;
            });
        }

        updateData();
    </script>
</body>
</html>
