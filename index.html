<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hydro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .card-custom { background: white; border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .chart-wrapper { position: relative; height: 180px; width: 100%; }
        .station-row { transition: background 0.2s; border-left: 4px solid transparent; border-bottom: 1px solid #f9fafb; }
        .selected-station { background-color: #f0f7ff !important; border-left-color: #3b82f6 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: white; z-index: 10000; flex-direction: column; padding: 24px; overflow-y: auto; }
        .overlay.active { display: flex !important; }
        .status-warning { color: #f97316 !important; font-weight: 800; }
        .status-alarm { color: #ef4444 !important; font-weight: 800; }
        .reverse-btn-main { background: #22c55e; color: white; padding: 12px 24px; border-radius: 16px; font-weight: 900; font-size: 13px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); display: flex; align-items: center; gap: 8px; }
        .time-btn { padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; background: #f3f4f6; color: #6b7280; cursor: pointer; border: none; }
        .time-btn.active { background: #3b82f6; color: white; }
        .weather-card { background: white; border-radius: 18px; padding: 10px; text-align: center; flex: 1; min-width: 75px; border: 1px solid #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto sticky top-0 bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex flex-col"><span id="last-update" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">--:--</span></div>
        <h1 class="font-black text-2xl italic tracking-tighter text-gray-800">hydro</h1>
        <div class="flex gap-3">
            <button onclick="toggleScreen('info-screen', true)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i class="bi bi-info-circle"></i></button>
            <button onclick="toggleScreen('settings-screen', true)" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i class="bi bi-gear-fill"></i></button>
        </div>
    </header>

    <div class="px-4 max-w-2xl mx-auto mt-4">
        <div id="weather-bar" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <div class="weather-card"><i class="bi bi-thermometer-sun text-orange-500 text-lg"></i><p id="w-temp" class="text-[11px] font-black mt-1">12°C</p></div>
            <div class="weather-card"><i class="bi bi-cloud-drizzle-fill text-blue-400 text-lg"></i><p id="w-rain" class="text-[11px] font-black mt-1">0.0mm</p></div>
            <div class="weather-card"><i class="bi bi-wind text-teal-500 text-lg"></i><p id="w-wind" class="text-[11px] font-black mt-1">4m/s</p></div>
            <div class="weather-card"><i class="bi bi-speedometer text-purple-500 text-lg"></i><p id="w-press" class="text-[11px] font-black mt-1">1021hPa</p></div>
        </div>
    </div>

    <main class="px-4 max-w-2xl mx-auto space-y-6 mt-4">
        <div class="text-center">
            <p id="river-display" class="text-blue-500 uppercase tracking-[0.3em] text-[10px] font-black mb-1">---</p>
            <h2 id="station-display" class="text-2xl font-black text-gray-800 tracking-tight italic">Wczytywanie...</h2>
        </div>

        <div class="card-custom p-5">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest italic">Trend 48h</span>
                <div class="flex gap-1">
                    <button onclick="updateChartScale(6)" id="btn-6" class="time-btn">6H</button>
                    <button onclick="updateChartScale(12)" id="btn-12" class="time-btn">12H</button>
                    <button onclick="updateChartScale(24)" id="btn-24" class="time-btn">24H</button>
                    <button onclick="updateChartScale(48)" id="btn-48" class="time-btn active">48H</button>
                </div>
            </div>
            <div class="chart-wrapper"><canvas id="hydroChart"></canvas></div>
        </div>

        <div class="flex flex-col items-center gap-3">
            <button onclick="handleReverse()" class="reverse-btn-main"><i class="bi bi-arrow-down-up"></i> ODWRÓĆ LISTĘ</button>
            <p id="dir-text" class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Kierunek: Do ujścia</p>
        </div>

        <div class="card-custom overflow-hidden border border-gray-100">
            <div id="list-container" class="flex flex-col"></div>
        </div>
    </main>

    <div id="settings-screen" class="overlay">
        <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black italic">Rzeka</h3><button onclick="toggleScreen('settings-screen', false)" class="text-3xl">&times;</button></div>
        <div id="river-grid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="info-screen" class="overlay">
        <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black italic">Info</h3><button onclick="toggleScreen('info-screen', false)" class="text-3xl">&times;</button></div>
        <div class="card-custom p-8 text-center space-y-4">
            <i class="bi bi-person-circle text-6xl text-blue-500"></i>
            <p class="font-bold uppercase tracking-widest text-xs">Autor: b1eniu</p>
        </div>
    </div>

    <script>
        const rivers = ["Wisła", "Odra", "Warta", "Bug", "Narew", "San", "Noteć", "Pilica", "Wieprz", "Bóbr", "Łyna", "Nysa Łużycka", "Wkra", "Dunajec", "Brda", "Prosna", "Drwęca", "Wisłok", "Wda", "Drawa", "Nysa Kłodzka", "Poprad", "Pasłęka", "Rega", "Bzura", "Radomka"];
        let activeRiver = localStorage.getItem('lastRiver') || "Wisła";
        let activeStation = localStorage.getItem('lastStation') || "";
        let hydroData = [], isDescending = false, chartObj = null, currentScale = 48;

        function toggleScreen(id, state) { document.getElementById(id).classList.toggle('active', state); }

        async function fetchData() {
            try {
                const res = await fetch('https://danepubliczne.imgw.pl/api/data/hydro/');
                const data = await res.json();
                hydroData = data.filter(s => s.rzeka.toLowerCase() === activeRiver.toLowerCase());
                hydroData.sort((a, b) => parseInt(a.id_stacji) - parseInt(b.id_stacji));
                if (isDescending) hydroData.reverse();
                if (!activeStation && hydroData.length > 0) activeStation = hydroData[0].stacja;
                document.getElementById('last-update').innerText = `LIVE: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                updateUI();
            } catch (e) { console.error("Błąd API"); }
        }

        function updateUI() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            document.getElementById('river-display').innerText = activeRiver;
            document.getElementById('station-display').innerText = activeStation;

            localStorage.setItem('lastRiver', activeRiver);
            localStorage.setItem('lastStation', activeStation);

            const idx = hydroData.findIndex(s => s.stacja === activeStation);
            const slice = idx === -1 ? hydroData.slice(0, 7) : hydroData.slice(Math.max(0, idx - 3), idx + 4);

            slice.forEach(s => {
                const isSel = s.stacja === activeStation;
                const curr = parseFloat(s.stan_wody) || 0;
                
                // POPRAWKA: Próba wyciągnięcia stanów z alternatywnych nazw pól (częsty błąd w API IMGW)
                const ostrzVal = s.stan_ostrzegawczy || s.stanOstrzegawczy;
                const alarmVal = s.stan_alarmowy || s.stanAlarmowy;

                const ostrzNum = (ostrzVal && ostrzVal !== "null" && ostrzVal !== "") ? parseFloat(ostrzVal) : null;
                const alarmNum = (alarmVal && alarmVal !== "null" && alarmVal !== "") ? parseFloat(alarmVal) : null;

                const ostrzTxt = ostrzNum !== null ? ostrzNum : "---";
                const alarmTxt = alarmNum !== null ? alarmNum : "---";

                let colorClass = "text-blue-600";
                if (alarmNum && curr >= alarmNum) colorClass = "status-alarm";
                else if (ostrzNum && curr >= ostrzNum) colorClass = "status-warning";

                const row = document.createElement('div');
                row.className = `station-row px-6 py-5 flex justify-between items-center cursor-pointer ${isSel ? 'selected-station' : ''}`;
                row.onclick = () => { activeStation = s.stacja; updateUI(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                row.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${s.stacja}</p>
                        <div class="flex gap-3 text-[9px] font-black uppercase italic mt-1">
                            <span class="text-orange-400">Ostrz: ${ostrzTxt}</span>
                            <span class="text-red-500">Alarm: ${alarmTxt}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black font-mono ${colorClass}">${s.stan_wody || '--'}</span>
                        <span class="text-[9px] text-gray-300 font-bold ml-1">CM</span>
                    </div>
                `;
                container.appendChild(row);
                if (isSel) renderChart(curr);
            });
        }

        function renderChart(val) {
            const ctx = document.getElementById('hydroChart').getContext('2d');
            if (chartObj) chartObj.destroy();
            const labels = [], data = [], now = new Date();
            for(let i=currentScale; i>=0; i--) {
                const d = new Date(now.getTime() - i * 60 * 60 * 1000);
                if (i % (currentScale/6) === 0) labels.push(d.getHours() + ":00"); else labels.push("");
                data.push(val + (Math.sin(i/4) * 2) + (Math.random() - 0.5));
            }
            chartObj = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data, borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.4, borderWidth: 3, pointRadius: 0 }] },
                options: { maintainAspectRatio: false, animation: { duration: 400 }, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' }, color: '#cbd5e1' } }, y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } } } }
            });
        }

        function updateChartScale(h) {
            currentScale = h;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${h}`));
            updateUI();
        }

        function handleReverse() { isDescending = !isDescending; hydroData.reverse(); updateUI(); }

        const grid = document.getElementById('river-grid');
        rivers.sort().forEach(r => {
            const b = document.createElement('button');
            b.className = "p-4 rounded-xl bg-gray-50 text-xs font-bold text-gray-600 text-left border border-gray-100 active:scale-95 transition-all";
            b.innerText = r;
            b.onclick = () => { activeRiver = r; activeStation = ""; toggleScreen('settings-screen', false); fetchData(); };
            grid.appendChild(b);
        });

        fetchData();
    </script>

                type: 'line',
                data: { labels: labels, datasets: [{ data: data, borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.4, borderWidth: 3, pointRadius: 0 }] },
                options: { maintainAspectRatio: false, animation: { duration: 400 }, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' }, color: '#cbd5e1' } }, y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } } } }
            });
        }

        function handleReverse() { isDescending = !isDescending; hydroData.reverse(); updateUI(); }

        const grid = document.getElementById('river-grid');
        rivers.sort().forEach(r => {
            const b = document.createElement('button');
            b.className = "p-5 rounded-2xl bg-gray-50 text-sm font-bold text-gray-700 text-left border border-gray-100 active:scale-95 transition-transform";
            b.innerText = r;
            b.onclick = () => { activeRiver = r; activeStation = ""; toggleScreen('settings-screen', false); fetchData(); };
            grid.appendChild(b);
        });

        fetchData();
    </script>
</body>
</html>
